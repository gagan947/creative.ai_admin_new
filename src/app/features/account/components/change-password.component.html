<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">      <h2>Change Password</h2>
    </div>
  </div>

  <section class="panel">
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid">
      <label>
        Current Password
        <span class="password-field">
          <input [type]="showCurrentPassword ? 'text' : 'password'" formControlName="currentPassword" />
          <button
            class="password-toggle"
            type="button"
            [attr.aria-label]="showCurrentPassword ? 'Hide current password' : 'Show current password'"
            (click)="toggleCurrentPassword()"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.9" />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.9" />
              <path *ngIf="showCurrentPassword" d="M4 4 20 20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
            </svg>
          </button>
        </span>
      </label>
      <label>
        New Password
        <span class="password-field">
          <input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword" />
          <button
            class="password-toggle"
            type="button"
            [attr.aria-label]="showNewPassword ? 'Hide new password' : 'Show new password'"
            (click)="toggleNewPassword()"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.9" />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.9" />
              <path *ngIf="showNewPassword" d="M4 4 20 20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
            </svg>
          </button>
        </span>
      </label>
      <label>
        Confirm Password
        <span class="password-field">
          <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword" />
          <button
            class="password-toggle"
            type="button"
            [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'"
            (click)="toggleConfirmPassword()"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.9" />
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.9" />
              <path *ngIf="showConfirmPassword" d="M4 4 20 20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
            </svg>
          </button>
        </span>
      </label>
      <button type="submit" class="save-btn">Update Password</button>
      <p class="success" *ngIf="changed">Password changed successfully (static demo).</p>
    </form>
  </section>
</section>
