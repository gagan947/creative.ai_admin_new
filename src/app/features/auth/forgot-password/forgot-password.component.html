<section class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h2>Forgot Password</h2>
    <p class="sub">Enter your email to receive reset instructions.</p>
    <label>Email <input type="email" formControlName="email" /></label>
    <button class="login-btn" type="submit">Send Reset Link</button>
    <p class="success" *ngIf="submitted">Reset link sent (static demo).</p>
    <a class="back-link" routerLink="/auth/login">Back to Login</a>
  </form>
</section>
