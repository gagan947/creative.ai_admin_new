<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">      <h2>Subscriptions & Billing</h2>
    </div>
    <div class="actions">
      <input placeholder="Search Subscriptions & Billing" />
      <app-ui-button label="Export CSV" variant="secondary"></app-ui-button>
    </div>
  </div>
  <section class="page-filters">
    <label><span>Billing From</span><input type="date" /></label>
    <label><span>Billing To</span><input type="date" /></label>
    <label><span>Plan</span><select><option>All</option><option>Free Plan</option><option>Standard Plan</option><option>Enterprise Plan</option></select></label>
    <label><span>Cycle</span><select><option>All</option><option>Monthly</option><option>Yearly</option></select></label>
  </section>
  <app-ui-table [columns]="columns" [rows]="rows"></app-ui-table>
</section>
