<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">
      <h2>Projects</h2>
    </div>
    <div class="actions">
      <input [ngModel]="filters.search" (ngModelChange)="onSearchChange($event)" placeholder="Search Projects" />
      <app-ui-button label="Export CSV" variant="secondary" [disabled]="!hasRows"
        (clicked)="exportCsv()"></app-ui-button>
    </div>
  </div>

  <section class="page-filters">
    <label><span>Created From</span><input type="date" [(ngModel)]="filters.createdFrom"
        (change)="onFilterChange()" /></label>
    <label><span>Created To</span><input type="date" [(ngModel)]="filters.createdTo"
        (change)="onFilterChange()" /></label>
    <label>
      <span>Status</span>
      <select [(ngModel)]="filters.status" (change)="onFilterChange()">
        <option value="all">All</option>
        <option value="success">Success</option>
        <option value="failed">Failed</option>
        <option value="pending">Pending</option>
      </select>
    </label>
    <label><span>User</span><input [ngModel]="filters.user" (ngModelChange)="onUserChange($event)"
        placeholder="User name" /></label>
  </section>

  <section class="table-section">
    <ng-template #projectCellTemplate let-row let-column="column">
      <ng-container [ngSwitch]="column">
        <span *ngSwitchCase="'Status'" class="status-badge" [class.success]="row['StatusTone'] === 'success'"
          [class.failed]="row['StatusTone'] === 'failed'" [class.pending]="row['StatusTone'] === 'pending'">
          {{ row['Status'] }}
        </span>
        <button *ngSwitchCase="'Action'" type="button" class="view-link" (click)="openProjectDetails(row)">
          View
        </button>
        <ng-container *ngSwitchDefault>{{ row[column] }}</ng-container>
      </ng-container>
    </ng-template>

    <app-ui-table [columns]="columns" [rows]="rows"
      [emptyMessage]="!loading ? 'No projects found' : 'Loading projects...'" [cellTemplate]="projectCellTemplate"
      [minWidth]="'920px'" [maxHeight]="'100%'"></app-ui-table>

    <div class="table-footer">
      <p>Showing {{ showingFrom }}-{{ showingTo }} of {{ totalItems }} projects</p>

      <div class="pagination">
        <button type="button" [disabled]="currentPage <= 1 || loading" (click)="goToPreviousPage()">Previous</button>
        <span>Page {{ currentPage }} of {{ totalPages }}</span>
        <button type="button" [disabled]="currentPage >= totalPages || loading" (click)="goToNextPage()">Next</button>
      </div>
    </div>
  </section>
</section>
