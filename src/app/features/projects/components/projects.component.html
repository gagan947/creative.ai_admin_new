<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">      <h2>Projects</h2>
    </div>
    <div class="actions">
      <input placeholder="Search Projects" />
      <app-ui-button label="Export CSV" variant="secondary"></app-ui-button>
    </div>
  </div>
  <section class="page-filters">
    <label><span>Created From</span><input type="date" /></label>
    <label><span>Created To</span><input type="date" /></label>
    <label><span>Status</span><select><option>All</option><option>Active</option><option>Draft</option><option>Archived</option></select></label>
    <label><span>User</span><input placeholder="User name" /></label>
  </section>
  <app-ui-table [columns]="columns" [rows]="rows"></app-ui-table>
</section>
