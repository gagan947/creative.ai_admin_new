<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">
      <h2>Deploy Requests</h2>
    </div>
    <div class="actions">
      <input
        [ngModel]="filters.search"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Search by user / email / project / domain / PRJ-id" />
      <app-ui-button
        label="Export CSV"
        variant="secondary"
        [disabled]="!hasRows"
        (clicked)="exportCsv()"></app-ui-button>
    </div>
  </div>
  <section class="page-filters">
    <label><span>Requested From</span><input type="date" [(ngModel)]="filters.requestedFrom" (change)="onFilterChange()" /></label>
    <label><span>Requested To</span><input type="date" [(ngModel)]="filters.requestedTo" (change)="onFilterChange()" /></label>
    <label><span>Deploy Status</span><select [(ngModel)]="filters.status" (change)="onFilterChange()">
        <option value="all">All</option>
        <option value="success">Success</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
      </select></label>
    <label><span>User</span><input [ngModel]="filters.user" (ngModelChange)="onUserChange($event)" placeholder="User / Email" /></label>
  </section>

  <section class="table-section">
    <div class="table-state" *ngIf="loading">Loading deploy requests...</div>
    <div class="table-state" *ngIf="!loading && !hasRows">No deploy requests found for the selected filters.</div>

    <app-ui-table
      [columns]="columns"
      [rows]="rows"
      [minWidth]="'920px'"
      [maxHeight]="'calc(100vh - 340px)'"></app-ui-table>

    <div class="table-footer">
      <p>Showing {{ showingFrom }}-{{ showingTo }} of {{ totalItems }} deploy requests</p>

      <div class="pagination">
        <button type="button" [disabled]="currentPage <= 1 || loading" (click)="goToPreviousPage()">Previous</button>
        <span>Page {{ currentPage }} of {{ totalPages }}</span>
        <button type="button" [disabled]="currentPage >= totalPages || loading" (click)="goToNextPage()">Next</button>
      </div>
    </div>
  </section>
</section>
