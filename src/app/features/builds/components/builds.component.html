<section class="feature-page">
  <div class="toolbar">
    <div class="title-brand">      <h2>Builds</h2>
    </div>
    <div class="actions">
      <input placeholder="Search Builds" />
      <app-ui-button label="Export CSV" variant="secondary"></app-ui-button>
    </div>
  </div>
  <section class="page-filters">
    <label><span>From</span><input type="date" /></label>
    <label><span>To</span><input type="date" /></label>
    <label><span>Status</span><select><option>All</option><option>Success</option><option>Failed</option></select></label>
    <label><span>Project</span><input placeholder="Project name / ID" /></label>
  </section>
  <app-ui-table [columns]="columns" [rows]="rows"></app-ui-table>
</section>
